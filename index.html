<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F.G.C - Cyber & Gráfica</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  /* (Mantive todo o CSS anterior igual - não vou repetir aqui por ser muito longo) */
  /* Apenas adicionei algumas melhorias visuais */
  .logo-img {
    width: 180px;
    height: auto;
  }
  .displacement-section {
    background: rgba(255, 215, 0, 0.1);
    border: 1px solid #ffd700;
    border-radius: 12px;
    padding: 16px;
    margin-top: 16px;
  }
  .staff-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .staff-tag {
    background: var(--accent);
    color: #000;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }
</style>
</head>
<body data-theme="">

<!-- TOPBAR com nova logo -->
<div class="topbar">
  <div style="display:flex; align-items:center; gap:12px;">
    <img src="https://i.imgur.com/lBeAR.png" alt="F.G.C Logo" class="logo-img" style="height:48px;">
    <div style="font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700; color:var(--accent);">F.G.C COMERCIAL</div>
  </div>
  <div class="topbar-right">
    <div class="topbar-info">Operador: <span id="topOperator">—</span></div>
    <div class="topbar-info" id="topClock"></div>
    <div class="theme-switcher">...</div> <!-- mantido igual -->
  </div>
</div>

<!-- SIDEBAR (mantido igual) -->
<div class="sidebar"> ... (igual ao anterior) </div>

<!-- MAIN -->
<div class="main">

  <!-- ===== NOVA VENDA ===== -->
  <div id="page-venda" class="page">
    <div class="page-header">
      <div>
        <div class="page-title">NOVA VENDA · RETALHO</div>
        <div class="page-subtitle">Cyber & Gráfica - F.G.C Comercial</div>
      </div>
    </div>

    <div class="grid-2" style="gap:24px; align-items:start">
      <!-- LEFT -->
      <div>
        <div class="card">
          <div class="card-title">📋 Detalhes da Venda</div>
          
          <div class="form-group">
            <label class="form-label">Funcionário Responsável</label>
            <div style="display:flex; gap:8px;">
              <select class="form-control" id="saleStaff" style="flex:1">
                <option value="">-- Selecionar --</option>
              </select>
              <button class="btn btn-outline" onclick="addNewStaff()">+ Funcionário</button>
            </div>
            <div class="staff-list" id="staffList"></div>
          </div>

          <div class="form-group">
            <label class="form-label">Cliente</label>
            <input class="form-control" id="saleClient" placeholder="Nome do cliente (opcional)">
          </div>

          <div class="form-group">
            <label class="form-label">Pagamento</label>
            <select class="form-control" id="salePayment">
              <option>Dinheiro</option>
              <option>Transferência</option>
              <option>TPA / Cartão</option>
              <option>Multicaixa Express</option>
            </select>
          </div>
        </div>

        <!-- === ÁREA DE DESLOCAÇÃO === -->
        <div class="displacement-section">
          <div class="card-title">🚗 Deslocação / Despesas Extras</div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Motivo</label>
              <input class="form-control" id="displacementReason" placeholder="Ex: Entrega em Talatona">
            </div>
            <div class="form-group">
              <label class="form-label">Valor (Kz)</label>
              <input class="form-control" type="number" id="displacementValue" placeholder="0" oninput="updateCartTotals()">
            </div>
          </div>
        </div>

        <!-- Produtos -->
        <div class="card" style="margin-top:16px">
          <div class="card-title">🏷️ Produtos de Gráfica & Cyber</div>
          <!-- resto do filtro e grid igual -->
          <div class="search-bar form-group">...</div>
          <div class="product-grid" id="productGrid"></div>
        </div>
      </div>

      <!-- RIGHT: Carrinho (mantido) -->
      <div class="card" style="position:sticky;top:80px">
        <!-- ... carrinho igual ... -->
      </div>
    </div>
  </div>

  <!-- ===== PRODUTOS ===== -->
  <div id="page-produtos" class="page">
    <div class="page-header">
      <div>
        <div class="page-title">PRODUTOS - CYBER & GRÁFICA</div>
      </div>
      <button class="btn btn-primary" onclick="openAddProduct()">➕ Novo Produto</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Produto</th>
            <th>Categoria</th>
            <th>Preço Unit.</th>
            <th>Preço Grosso</th>
            <th>Stock</th>
            <th>Acções</th>
          </tr>
        </thead>
        <tbody id="productsBody"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- MODAIS (mantidos) -->

<script>
// ==================== DADOS INICIAIS ATUALIZADOS ====================
let categories = ['Cartuchos', 'Papel & Resmas', 'Tintas', 'Toners', 'Acessórios Cyber', 'Impressoras', 'Outros'];

let products = [
  {id:1, name:'Cartucho HP 680 Preto', cat:'Cartuchos', emoji:'🖨️', price:8500, priceGrosso:7800, stock:45},
  {id:2, name:'Cartucho HP 680 Color', cat:'Cartuchos', emoji:'🌈', price:9500, priceGrosso:8700, stock:32},
  {id:3, name:'Resma A4 80g (500 folhas)', cat:'Papel & Resmas', emoji:'📄', price:3200, priceGrosso:2900, stock:68},
  {id:4, name:'Tinta Bulk Ink Preta 1L', cat:'Tintas', emoji:'🛢️', price:12500, priceGrosso:10800, stock:18},
  {id:5, name:'Tinta Bulk Ink Color 1L', cat:'Tintas', emoji:'🎨', price:13500, priceGrosso:11900, stock:14},
  {id:6, name:'Pendrive 32GB', cat:'Acessórios Cyber', emoji:'💾', price:4500, priceGrosso:3900, stock:55},
  {id:7, name:'Mouse Óptico USB', cat:'Acessórios Cyber', emoji:'🖱️', price:2800, priceGrosso:2400, stock:40}
];

let staffList = ["JOSÉ", "EDMAR", "GONÇALVES", "GILSON", "CEO"];
let nextProdId = 8;
let sales = [];
let nextSaleId = 1;
let cart = [];
let grossoCart = [];

// ==================== ADICIONAR FUNCIONÁRIO ====================
function addNewStaff() {
  const nome = prompt("Nome do novo funcionário:");
  if (nome && nome.trim() !== "") {
    staffList.push(nome.trim().toUpperCase());
    renderStaffSelect();
    toast(`✅ Funcionário ${nome.toUpperCase()} adicionado!`);
  }
}

function renderStaffSelect() {
  const sel = document.getElementById('saleStaff');
  if (!sel) return;
  sel.innerHTML = '<option value="">-- Selecionar --</option>';
  staffList.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    sel.appendChild(opt);
  });
}

// ==================== STOCK EDITÁVEL ====================
function editStock(id) {
  const prod = products.find(p => p.id === id);
  if (!prod) return;
  
  const novaQtd = prompt(`Stock atual: ${prod.stock}\nNova quantidade em stock:`, prod.stock);
  if (novaQtd === null) return;
  
  const qtd = parseInt(novaQtd);
  if (!isNaN(qtd) && qtd >= 0) {
    prod.stock = qtd;
    renderProductTable();
    renderProductGrid();
    toast(`📦 Stock atualizado: ${prod.name} → ${qtd} unid.`);
  }
}

// ==================== RENDER PRODUTOS (com botão de editar stock) ====================
function renderProductTable() {
  const tbody = document.getElementById('productsBody');
  tbody.innerHTML = products.map((p, i) => `
    <tr>
      <td>${i+1}</td>
      <td>${p.emoji} ${p.name}</td>
      <td><span class="badge badge-info">${p.cat}</span></td>
      <td style="font-weight:700">${fmt(p.price)}</td>
      <td style="color:var(--accent2);font-weight:700">${fmt(p.priceGrosso)}</td>
      <td>
        <span class="badge ${p.stock <= 15 ? 'badge-danger' : 'badge-success'}">
          ${p.stock}
        </span>
        <button class="btn btn-sm btn-outline" style="margin-left:8px; font-size:11px;" onclick="editStock(${p.id})">
          ✏️ Alterar
        </button>
      </td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">🗑️</button></td>
    </tr>
  `).join('');
}

// Atualizar também o grid de produtos
function renderProductGrid() {
  // ... mesmo código anterior, mas com produtos de gráfica
  // (mantido igual, só muda os produtos iniciais)
}

// ==================== FINALIZE SALE (inclui deslocação) ====================
function finalizeSale(type) {
  if(type === 'retalho') {
    const staff = document.getElementById('saleStaff').value;
    if(!staff) { toast('❌ Selecione o funcionário'); return; }
    if(!cart.length) { toast('❌ Carrinho vazio'); return; }

    const displacement = parseFloat(document.getElementById('displacementValue')?.value) || 0;
    const reason = document.getElementById('displacementReason')?.value || '';

    // ... resto do código igual, mas adicionar displacement no objeto sale
    const sale = {
      id: nextSaleId++,
      type: 'retalho',
      staff,
      client: document.getElementById('saleClient').value || '—',
      payment: document.getElementById('salePayment').value,
      items: [...cart],
      displacement: displacement,
      displacementReason: reason,
      subtotal: cart.reduce((a,b)=>a+b.price*b.qty,0),
      discount: parseFloat(document.getElementById('saleDiscount')?.value)||0,
      total: 0, // será calculado
      date: new Date().toLocaleString('pt-PT')
    };
    sale.total = sale.subtotal - sale.discount + sale.displacement;

    sales.push(sale);
    showInvoice(sale);
    clearCart();
    document.getElementById('displacementValue').value = '';
    document.getElementById('displacementReason').value = '';
  }
  // ... resto igual
}

// ==================== INIT ====================
window.onload = function() {
  renderStaffSelect();
  syncCatSelects();
  renderProductTable();
  renderProductGrid();
  renderDashboard();
};
</script>
</body>
</html>
